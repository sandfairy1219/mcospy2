name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Get version from tag
      id: get_version
      run: |
        $tag = $env:GITHUB_REF -replace 'refs/tags/v', ''
        echo "VERSION=$tag" >> $env:GITHUB_ENV
        echo "version=$tag" >> $env:GITHUB_OUTPUT
        Write-Host "Version: $tag"

    - name: Update package.json version
      run: |
        $packageJson = Get-Content package.json -Raw | ConvertFrom-Json
        $packageJson.version = $env:VERSION
        $packageJson | ConvertTo-Json -Depth 10 | Set-Content package.json

    - name: Build and create release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx electron-builder --win --publish=always

    # Create a separate GitHub release for the renamed file
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref }}
        name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        files: |
          build/pixel-Setup-${{ env.VERSION }}.exe
          build/latest.yml
          build/pixel-Setup-${{ env.VERSION }}.exe.blockmap
