<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <!-- language selector -->
    <select id="lang" class="text-sm">
        <option value="en">English</option>
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
    </select>
    <!-- back button -->
    <button id="back" class="hide"><i class="fa fa-arrow-left"></i></button>
    <!-- login page -->
    <div class="page" id="login">
        <img src="./icon.svg" style="width: 30vw; height: 30vw;" alt="icon">
        <div class="form">
            <!-- auto updater -->
            <p id="updp" class="w-full text-center" data-lang="checking-for-updates"></p>
            <div id="updbar" class="w-full bar hide flex rounded-full bg-neutral-300 h-2">
                <div id="updprg" class="prg flex rounded-full bg-sky-400 h-2 transition-all" style="width: 0%;"></div>
            </div>
            <!-- token -->
            <div id="logform" class="flex flex-col gap-1 hide">
                <input id="key" type="password" data-lang-ph="key" class="w-full text-center">
                <button id="logbtn" class="w-full" data-lang="login"></button>
                <p id="logerr" class="w-full text-red-400 text-center"></p>
            </div>
        </div>
    </div>
    <!-- main page -->
    <div class="page hide" id="app">
        <section id="selector">
            <button class="w-full selector" id="selector-initialize" data-lang="initialize"></button>
            <button class="w-full selector" id="selector-cheats" data-lang="cheats"></button>
            <button class="w-full selector" id="selector-settings" data-lang="settings"></button>
            <button class="w-full selector" id="selector-dev-mode" data-lang="dev-mode"></button>
        </section>
        <section id="initialize" class="hide">
            <div>
                <input class="config w-full text-center" type="text" id="serial" data-lang-ph="serial" value="127.0.0.1:5555">
            </div>
            <div>
                <div id="state-adb" class="state"></div>
                <div data-lang="adb"></div>
                <div id="state-adb-log" class="log"></div>
            </div>
            <div>
                <div id="state-server" class="state"></div>
                <div data-lang="server"></div>
                <div id="state-server-log" class="log"></div>
            </div>
            <div>
                <div id="state-frida" class="state"></div>
                <div data-lang="frida"></div>
                <div id="state-frida-log" class="log"></div>
            </div>
            <div>
                <div id="state-session" class="state"></div>
                <div data-lang="session"></div>
                <div id="state-session-log" class="log"></div>
            </div>
            <button id="connect-adb" data-lang="connect-adb"></button>
            <div>
                <button class="w-full" id="start-server" data-lang="start-server"></button>
                <button class="w-full" id="download-server" data-lang="download-server"></button>
                <button class="w-full" id="upload-server" data-lang="upload-server"></button>
            </div>
            <button id="connect-frida" data-lang="connect-frida"></button>
            <div>
                <input type="text" id="cookie" class="text-center w-full" data-lang-ph="cookie">
                <button class="w-full" id="get-cookie" data-lang="get-cookie"></button>
            </div>
            <button id="start-agent" data-lang="start-agent"></button>
        </section>
        <section id="cheats" class="hide">
            <div>
                <div id="state-epos" class="state"></div>
                <div data-lang="epos"></div>
                <div id="state-epos-log" class="log"></div>
            </div>
            <div>
                <div id="state-entity" class="state"></div>
                <div data-lang="entity"></div>
                <div id="state-entity-log" class="log"></div>
            </div>
            <div>
                <input class="config w-full" type="text" id="except-number" data-lang-ph="except-number">
                <input class="config" type="checkbox" id="except-reverse">
            </div>
            <div class="justify-between">
                <div data-lang="show-layout"></div>
                <input type="checkbox" id="show-layout">
            </div>
            <div class="justify-between">
                <div data-lang="lock-layout"></div>
                <input type="checkbox" id="lock-layout">
            </div>
            <div>
                <button id="scan-epos" data-lang="scan-epos"></button>
                <button id="scan-entity" data-lang="scan-entity"></button>
                <button id="clear-all" data-lang="clear-all"></button>
            </div>
            <div>
                <input type="text" id="key-scan-epos" class="min w-full keybind" data-lang-ph="keybind">
                <input type="text" id="key-scan-entity" class="min w-full keybind" data-lang-ph="keybind">
                <input type="text" id="key-clear-all" class="min w-full keybind" data-lang-ph="keybind">
            </div>
            <details>
                <summary id="aimbot" data-lang="aimbot"></summary>
                <div>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-aimbot" class="keybind" data-lang-ph="keybind">
                </div>
                <div>
                    <div data-lang="aimbot-mode"></div>
                    <select class="config" id="aimbot-mode">
                        <option value="normal" data-lang="normal"></option>
                        <option value="smooth" data-lang="smooth"></option>
                        <option value="instant" data-lang="instant"></option>
                    </select>
                </div>
                <div>
                    <div data-lang="aimbot-speed"></div>
                    <input class="config" type="number" id="aimbot-speed" min="1" max="100" value="20">
                </div>
                <div>
                    <div data-lang="aimbot-limit"></div>
                    <input class="config" type="number" id="aimbot-limit" min="0" max="90" value="3">
                </div>
                <div>
                    <div data-lang="aimbot-pitch-offset"></div>
                    <input class="config" type="number" id="aimbot-pitch-offset" min="-3" max="3" value="0">
                </div>
                <div>
                    <div data-lang="aimbot-ignore"></div>
                    <input class="config" type="checkbox" id="aimbot-ignore">
                </div>
                <div>
                    <div data-lang="aimbot-ignore-death"></div>
                    <input class="config" type="checkbox" id="aimbot-ignore-death">
                </div>
            </details>
            <details>
                <summary id="esp" data-lang="esp"></summary>
                <div>
                    <div data-lang="esp-tracer"></div>
                    <input class="config" type="checkbox" id="esp-tracer">
                </div>
                <div>
                    <div data-lang="esp-3d"></div>
                    <input class="config" type="checkbox" id="esp-3d">
                </div>
                <div>
                    <div data-lang="esp-color"></div>
                    <input class="config" type="color" id="esp-color">
                </div>
                <div>
                    <div data-lang="esp-mark-keybind"></div>
                    <input type="text" id="key-esp-mark" class="keybind" data-lang-ph="keybind">
                </div>
            </details>
            <details>
                <summary id="blackhole" data-lang="blackhole"></summary>
                <div>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-blackhole" class="keybind" data-lang-ph="keybind">
                </div>
                <div>
                    <div data-lang="blackhole-distance"></div>
                    <input class="config" type="number" id="blackhole-distance" min="1" max="100" value="20">
                </div>
                <div>
                    <div data-lang="blackhole-ignore"></div>
                    <input class="config" type="checkbox" id="blackhole-ignore">
                </div>
                <div>
                    <div data-lang="blackhole-ignore-death"></div>
                    <input class="config" type="checkbox" id="blackhole-ignore-death">
                </div>
            </details>
            <details>
                <summary id="shoot-speed" data-lang="shoot-speed"></summary>
                <div>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-shoot-speed" class="keybind" data-lang-ph="keybind">
                </div>
            </details>
            <details>
                <summary class="no" id="no-recoil" data-lang="no-recoil"></summary>
            </details>
            <details>
                <summary class="no" id="no-spread" data-lang="no-spread"></summary>
            </details>
            <details>
                <summary class="no" id="no-reload" data-lang="no-reload"></summary>
            </details>
            <details>
                <summary class="no" id="skill-cooldown" data-lang="skill-cooldown"></summary>
            </details>
            <details>
                <summary class="no" id="instant-respawn" data-lang="instant-respawn"></summary>
            </details>
            <details>
                <summary class="no" id="no-clip" data-lang="no-clip"></summary>
            </details>
            <details>
                <summary id="move-speed" data-lang="move-speed"></summary>
                <div>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-move-speed" class="keybind" data-lang-ph="keybind">
                </div>
                <div>
                    <div data-lang="move-speed-value"></div>
                    <input class="config" type="number" id="move-speed-value" min="0.1" max="100" value="3">
                </div>
            </details>
            <details>
                <summary id="fly" data-lang="fly"></summary>
                <div>
                    <div data-lang="fly-up-keybind"></div>
                    <input type="text" id="key-fly-up" class="keybind" data-lang-ph="keybind">
                </div>
                <div>
                    <div data-lang="fly-down-keybind"></div>
                    <input type="text" id="key-fly-down" class="keybind" data-lang-ph="keybind">
                </div>
                <div>
                    <div data-lang="fly-speed"></div>
                    <input class="config" type="number" id="fly-speed" min="0" max="100" value="4">
                </div>
            </details>
            <details>
                <summary class="no" id="one-kill" data-lang="one-kill"></summary>
            </details>
            <details>
                <summary class="no" id="skill-damage" data-lang="skill-damage"></summary>
            </details>
            <details>
                <summary id="upskill" data-lang="upskill"></summary>
                <div>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-upskill" class="keybind" data-lang-ph="keybind">
                </div>
                <div>
                    <div data-lang="upskill-value"></div>
                    <input class="config" type="number" id="upskill-value" min="0" max="9999" value="0">
                </div>
                <div>
                    <div data-lang="upskill-except-timer"></div>
                    <input class="config" type="checkbox" id="upskill-except-timer">
                </div>
            </details>
            <details>
                <summary id="grenade" data-lang="grenade"></summary>
                <div>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-grenade" class="keybind" data-lang-ph="keybind">
                </div>
            </details>
            <details>
                <summary data-lang="changer"></summary>
                <div>
                    <input class="w-full text-center" type="text" id="pos-x" placeholder="X">
                    <input class="w-full text-center" type="text" id="pos-y" placeholder="Y">
                    <input class="w-full text-center" type="text" id="pos-z" placeholder="Z">
                    <button class="w-full" id="pos-reverse" data-lang="reverse"></button>
                </div>
                <div>
                    <div data-lang="reverse-keybind"></div>
                    <input type="text" id="key-reverse" class="keybind" data-lang-ph="keybind">
                </div>
                <div>
                    <input class="w-full text-center" type="text" id="skillcode" data-lang-ph="skillcode">
                </div>
                <button class="w-full" id="change-ads-reward" data-lang="change-ads-reward"></button>
            </details>
        </section>
        <section id="settings" class="hide">
        </section>
        <section id="dev-mode" class="hide">
            <details>
                <summary data-lang="ranges"></summary>
                <div>
                    <input class="w-full" type="text" id="base" data-lang-ph="base">
                </div>
                <div>
                    <button class="w-full" id="get-ranges" data-lang="get"></button>
                    <button class="w-full" id="find-ranges" data-lang="find"></button>
                </div>
            </details>
        </section>
    </div>
    <script type="module" src="../dist/main.js"></script>
</body>
</html>
