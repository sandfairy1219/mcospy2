<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <!-- language selector -->
    <select id="lang" class="text-sm">
        <option value="en">English</option>
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
    </select>
    <!-- back button -->
    <button id="back" class="hide"><i class="fa fa-arrow-left"></i></button>
    <!-- login page -->
    <div class="page" id="login">
        <img src="./icon.svg" style="width: 30vw; height: 30vw;" alt="icon">
        <div class="form">
            <!-- auto updater -->
            <p id="updp" class="w-full text-center" data-lang="checking-for-updates"></p>
            <div id="updbar" class="w-full bar hide flex rounded-full bg-neutral-300 h-2">
                <div id="updprg" class="prg flex rounded-full bg-sky-400 h-2 transition-all" style="width: 0%;"></div>
            </div>
            <!-- token -->
            <div id="logform" class="flex flex-col gap-1 hide">
                <input id="key" type="password" data-lang-ph="key" class="w-full text-center">
                <button id="logbtn" class="w-full" data-lang="login"></button>
                <p id="logerr" class="w-full text-red-400 text-center"></p>
            </div>
        </div>
    </div>
    <!-- main page -->
    <div class="page hide" id="app">
        <section id="selector">
            <button class="w-full selector" id="selector-initialize" data-lang="initialize"></button>
            <button class="w-full selector" id="selector-cheats" data-lang="cheats"></button>
            <button class="w-full selector" id="selector-macros" data-lang="macros"></button>
            <button class="w-full selector" id="selector-settings" data-lang="settings"></button>
            <button class="w-full selector" id="selector-server" data-lang="server"></button>
            <button class="w-full selector" id="selector-plugins" data-lang="plugins"></button>
            <button class="w-full selector hide" id="selector-dev-mode" data-lang="dev-mode"></button>
        </section>
        <section id="initialize" class="hide">
            <div>
                <input class="config w-full text-center" type="text" id="serial" data-lang-ph="serial" value="127.0.0.1:5555">
            </div>
            <div>
                <div id="state-adb" class="state"></div>
                <div data-lang="adb"></div>
                <div id="state-adb-log" class="log"></div>
            </div>
            <div>
                <div id="state-server" class="state"></div>
                <div data-lang="server"></div>
                <div id="state-server-log" class="log"></div>
            </div>
            <div>
                <div id="state-frida" class="state"></div>
                <div data-lang="frida"></div>
                <div id="state-frida-log" class="log"></div>
            </div>
            <div>
                <div id="state-session" class="state"></div>
                <div data-lang="session"></div>
                <div id="state-session-log" class="log"></div>
            </div>
            <div>
                <button id="connect-adb" data-lang="connect-adb"></button>
                <button id="connect-serial" data-lang="connect-serial"></button>
            </div>
            <div>
                <button class="w-full" id="start-server" data-lang="start-server"></button>
                <button class="w-full" id="download-server" data-lang="download-server"></button>
                <button class="w-full" id="upload-server" data-lang="upload-server"></button>
            </div>
            <button id="connect-frida" data-lang="connect-frida"></button>
            <div>
                <input type="text" id="cookie" class="text-center w-full" data-lang-ph="cookie">
                <button class="w-full" id="get-cookie" data-lang="get-cookie"></button>
            </div>
            <button id="start-agent" data-lang="start-agent"></button>
        </section>
        <section id="cheats" class="hide">
            <div>
                <div id="state-epos" class="state"></div>
                <div data-lang="epos"></div>
                <div id="state-epos-log" class="log"></div>
            </div>
            <div>
                <div id="state-entity" class="state"></div>
                <div data-lang="entity"></div>
                <div id="state-entity-log" class="log"></div>
            </div>
            <div>
                <input class="config w-full" type="text" id="except-number" data-lang-ph="except-number">
                <input class="config" type="checkbox" id="except-reverse">
            </div>
            <div class="justify-between">
                <div data-lang="show-layout"></div>
                <input type="checkbox" id="show-layout">
            </div>
            <div class="justify-between">
                <div data-lang="lock-layout"></div>
                <input type="checkbox" id="lock-layout">
            </div>
            <div>
                <button id="scan-epos" data-lang="scan-epos"></button>
                <button id="scan-entity" data-lang="scan-entity"></button>
                <button id="clear-all" data-lang="clear-all"></button>
            </div>
            <div>
                <input type="text" id="key-scan-epos" class="min w-full keybind" data-lang-ph="keybind">
                <input type="text" id="key-scan-entity" class="min w-full keybind" data-lang-ph="keybind">
                <input type="text" id="key-clear-all" class="min w-full keybind" data-lang-ph="keybind">
            </div>
            <details>
                <summary id="aimbot" data-lang="aimbot"></summary>
                <main>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-aimbot" class="keybind" data-lang-ph="keybind">
                </main>
                <main>
                    <div data-lang="aimbot-mode"></div>
                    <select class="config" id="aimbot-mode">
                        <option value="normal" data-lang="normal"></option>
                        <option value="smooth" data-lang="smooth"></option>
                        <option value="instant" data-lang="instant"></option>
                    </select>
                </main>
                <main>
                    <div data-lang="aimbot-speed"></div>
                    <input class="config" type="number" id="aimbot-speed" min="1" max="100" value="20">
                </main>
                <main>
                    <div data-lang="aimbot-limit"></div>
                    <input class="config" type="number" id="aimbot-limit" min="0" max="90" value="3">
                </main>
                <main>
                    <div data-lang="aimbot-pitch-offset"></div>
                    <input class="config" type="number" id="aimbot-pitch-offset" min="-3" max="3" value="0">
                </main>
                <main>
                    <div data-lang="aimbot-acceleration"></div>
                    <input class="config" type="checkbox" id="aimbot-acceleration">
                </main>
                <main>
                    <div data-lang="aimbot-main-weapon-only"></div>
                    <input class="config" type="checkbox" id="aimbot-main-weapon-only">
                </main>
                <main>
                    <div data-lang="aimbot-ignore"></div>
                    <input class="config" type="checkbox" id="aimbot-ignore">
                </main>
                <main>
                    <div data-lang="aimbot-ignore-death"></div>
                    <input class="config" type="checkbox" id="aimbot-ignore-death">
                </main>
            </details>
            <details>
                <summary id="aim-assist" data-lang="aim-assist"></summary>
                <main>
                    <div data-lang="aim-assist-speed"></div>
                    <input class="config" type="number" id="aim-assist-speed" min="1" max="100" value="20">
                </main>
                <main>
                    <div data-lang="aim-assist-limit"></div>
                    <input class="config" type="number" id="aim-assist-limit" min="0" max="90" value="3">
                </main>
                <main>
                    <div data-lang="aim-assist-pitch-offset"></div>
                    <input class="config" type="number" id="aim-assist-pitch-offset" min="-3" max="3" value="0">
                </main>
                <main>
                    <div data-lang="aim-assist-decay"></div>
                    <input class="config" type="number" id="aim-assist-decay" min="0" max="1" value="0.1">
                </main>
                <main>
                    <div data-lang="aim-assist-ignore"></div>
                    <input class="config" type="checkbox" id="aim-assist-ignore">
                </main>
                <main>
                    <div data-lang="aim-assist-ignore-death"></div>
                    <input class="config" type="checkbox" id="aim-assist-ignore-death">
                </main>
            </details>
            <details>
                <summary id="esp" data-lang="esp"></summary>
                <main>
                    <div data-lang="esp-tracer"></div>
                    <input class="config" type="checkbox" id="esp-tracer">
                </main>
                <main>
                    <div data-lang="esp-3d"></div>
                    <input class="config" type="checkbox" id="esp-3d">
                </main>
                <main>
                    <div data-lang="esp-font-size"></div>
                    <input class="config" type="number" id="esp-font-size" min="1" max="100" value="16">
                </main>
                <main>
                    <div data-lang="esp-tag"></div>
                    <input class="config" type="checkbox" id="esp-tag">
                </main>
                <main>
                    <div data-lang="esp-tag-type"></div>
                    <select class="config" id="esp-tag-type">
                        <option value="both" data-lang="both"></option>
                        <option value="number" data-lang="number"></option>
                        <option value="nickname" data-lang="nickname"></option>
                    </select>
                </main>
                <main>
                    <div data-lang="esp-bar"></div>
                    <input class="config" type="checkbox" id="esp-bar">
                </main>
                <main>
                    <div data-lang="esp-color"></div>
                    <input class="config" type="color" id="esp-color" value="#ff0000">
                </main>
                <main>
                    <div data-lang="esp-mark-color"></div>
                    <input class="config" type="color" id="esp-mark-color" value="#0000ff">
                </main>
                <main>
                    <div data-lang="esp-dead-color"></div>
                    <input class="config" type="color" id="esp-dead-color" value="#aaaaaa">
                </main>
                <main>
                    <div data-lang="esp-pitch-offset"></div>
                    <input class="config" type="number" id="esp-pitch-offset" min="-3" max="3" value="0">
                </main>
                <main>
                    <div data-lang="esp-mark-keybind"></div>
                    <input type="text" id="key-esp-mark" class="keybind" data-lang-ph="keybind">
                </main>
            </details>
            <details>
                <summary id="blackhole" data-lang="blackhole"></summary>
                <main>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-blackhole" class="keybind" data-lang-ph="keybind">
                </main>
                <main>
                    <div data-lang="blackhole-target"></div>
                    <select class="config" id="blackhole-target">
                        <option value="crosshair" data-lang="crosshair"></option>
                        <option value="position" data-lang="position"></option>
                    </select>
                </main>
                <main>
                    <div data-lang="blackhole-distance"></div>
                    <input class="config" type="number" id="blackhole-distance" min="1" max="100" value="20">
                </main>
                <main>
                    <div data-lang="blackhole-position"></div>
                </main>
                <main>
                    <input class="config w-full text-center" type="number" id="blackhole-x" value="0" min="-9999" max="9999">
                    <input class="config w-full text-center" type="number" id="blackhole-y" value="0" min="-9999" max="9999">
                    <input class="config w-full text-center" type="number" id="blackhole-z" value="0" min="-9999" max="9999">
                </main>
                <main>
                    <div data-lang="blackhole-ignore"></div>
                    <input class="config" type="checkbox" id="blackhole-ignore">
                </main>
                <main>
                    <div data-lang="blackhole-ignore-death"></div>
                    <input class="config" type="checkbox" id="blackhole-ignore-death">
                </main>
                <main>
                    <div data-lang="blackhole-prevent-lagger"></div>
                    <input class="config" type="checkbox" id="blackhole-prevent-lagger">
                </main>
                <main>
                    <div data-lang="blackhole-force-drop"></div>
                    <input class="config" type="checkbox" id="blackhole-force-drop">
                </main>
            </details>
            <details>
                <summary id="shoot-speed" data-lang="shoot-speed"></summary>
                <main>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-shoot-speed" class="keybind" data-lang-ph="keybind">
                </main>
            </details>
            <details>
                <summary class="no" id="no-recoil" data-lang="no-recoil"></summary>
            </details>
            <details>
                <summary class="no" id="no-spread" data-lang="no-spread"></summary>
            </details>
            <details>
                <summary class="no" id="no-reload" data-lang="no-reload"></summary>
            </details>
            <details>
                <summary class="no" id="skill-cooldown" data-lang="skill-cooldown"></summary>
            </details>
            <details>
                <summary class="no" id="instant-respawn" data-lang="instant-respawn"></summary>
            </details>
            <details>
                <summary class="no" id="no-clip" data-lang="no-clip"></summary>
            </details>
            <details>
                <summary id="move-speed" data-lang="move-speed"></summary>
                <main>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-move-speed" class="keybind" data-lang-ph="keybind">
                </main>
                <main>
                    <div data-lang="move-speed-value"></div>
                    <input class="config" type="number" id="move-speed-value" min="0.1" max="100" value="3">
                </main>
            </details>
            <details>
                <summary id="fly" data-lang="fly"></summary>
                <main>
                    <div data-lang="fly-up-keybind"></div>
                    <input type="text" id="key-fly-up" class="keybind" data-lang-ph="keybind">
                </main>
                <main>
                    <div data-lang="fly-down-keybind"></div>
                    <input type="text" id="key-fly-down" class="keybind" data-lang-ph="keybind">
                </main>
                <main>
                    <div data-lang="fly-speed"></div>
                    <input class="config" type="number" id="fly-speed" min="0" max="100" value="4">
                </main>
            </details>
            <details>
                <summary id="infinite-jump" data-lang="infinite-jump"></summary>
                <main>
                    <div data-lang="infinite-jump-keybind"></div>
                    <input type="text" id="key-infinite-jump" class="keybind" data-lang-ph="keybind">
                </main>
            </details>
            <!-- <details>
                <summary id="freecam" data-lang="freecam"></summary>
                <main>
                    <div data-lang="freecam-cam-speed"></div>
                    <input class="config" type="number" id="freecam-cam-speed" min="0" max="100" value="0.05">
                </main>
                <main>
                    <div data-lang="freecam-move-speed"></div>
                    <input class="config" type="number" id="freecam-move-speed" min="0" max="100" value="2">
                </main>
            </details> -->
            <details>
                <summary class="no" id="one-kill" data-lang="one-kill"></summary>
            </details>
            <details>
                <summary class="no" id="skill-damage" data-lang="skill-damage"></summary>
            </details>
            <details>
                <summary id="upskill" data-lang="upskill"></summary>
                <main>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-upskill" class="keybind" data-lang-ph="keybind">
                </main>
                <main>
                    <div data-lang="upskill-value"></div>
                    <input class="config" type="number" id="upskill-value" min="0" max="9999" value="0">
                </main>
                <main>
                    <div data-lang="upskill-except-timer"></div>
                    <input class="config" type="checkbox" id="upskill-except-timer">
                </main>
            </details>
            <details>
                <summary id="grenade" data-lang="grenade"></summary>
                <main>
                    <div data-lang="keybind"></div>
                    <input type="text" id="key-grenade" class="keybind" data-lang-ph="keybind">
                </main>
            </details>
            <details>
                <summary class="no" id="hide-me" data-lang="hide-me"></summary>
            </details>
            <details>
                <summary class="no" id="cooker-buff" data-lang="cooker-buff"></summary>
            </details>
            <details>
                <summary data-lang="changer"></summary>
                <main>
                    <input class="w-full text-center" type="text" id="pos-x" placeholder="X">
                    <input class="w-full text-center" type="text" id="pos-y" placeholder="Y">
                    <input class="w-full text-center" type="text" id="pos-z" placeholder="Z">
                    <button class="w-full" id="pos-reverse" data-lang="reverse"></button>
                </main>
                <main>
                    <div data-lang="reverse-keybind"></div>
                    <input type="text" id="key-reverse" class="keybind" data-lang-ph="keybind">
                </main>
                <main>
                    <input class="w-full text-center" type="text" id="skillcode" data-lang-ph="skillcode">
                </main>
                <button class="w-full" id="change-ads-reward" data-lang="change-ads-reward"></button>
            </details>
            <details>
                <summary data-lang="ctm"></summary>
                <div class="w-full" data-lang="ctm-default"></div>
                <main>
                    <button class="w-full" id="ctm-default-milk" data-lang="milk"></button>
                    <button class="w-full" id="ctm-default-choco" data-lang="choco"></button>
                </main>
                <div class="w-full" data-lang="ctm-desert"></div>
                <main>
                    <button class="w-full" id="ctm-desert-milk" data-lang="milk"></button>
                    <button class="w-full" id="ctm-desert-choco" data-lang="choco"></button>
                </main>
                <div class="w-full" data-lang="ctm-castle"></div>
                <main>
                    <button class="w-full" id="ctm-castle-milk" data-lang="milk"></button>
                    <button class="w-full" id="ctm-castle-choco" data-lang="choco"></button>
                </main>
                <div class="w-full" data-lang="ctm-mountain"></div>
                <main>
                    <button class="w-full" id="ctm-mountain-milk" data-lang="milk"></button>
                    <button class="w-full" id="ctm-mountain-choco" data-lang="choco"></button>
                </main>
            </details>
            <details>
                <summary data-lang="macro"></summary>
                <div id="macro-list"></div>
            </details>
        </section>
        <section id="macros" class="hide">
            <input type="text" data-lang-ph="search" id="search-macro" class="w-full">
            <div id="macros-list">
                <main>
                    <div type="text" id="list-id" data-lang="id" class="w-full"></div>
                    <button id="id-add" class="macro-apply w-16">+</button>
                </main>
                <main>
                    <div type="text" id="list-id" data-lang="id" class="w-full"></div>
                    <button id="id-add" class="w-16">+</button>
                </main>
                <main>
                    <div type="text" id="list-id" data-lang="id" class="w-full"></div>
                    <button id="id-add" class="w-16">+</button>
                </main>
            </div>
        </section>
        <section id="settings" class="hide">
            <details>
                <summary data-lang="general"></summary>
                <main>
                    <div data-lang="frame"></div>
                    <input class="config" type="number" id="frame" min="1" max="120" value="60">
                </main>
            </details>
        </section>
        <section id="server" class="hide">
            <details>
                <summary data-lang="manager"></summary>
                <div>
                    <div id="state-express" class="state"></div>
                    <div data-lang="server"></div>
                    <div id="state-express-log" class="log"></div>
                </div>
                <div>
                    <button class="w-full h-full" id="server-start" data-lang="start"></button>
                    <button class="w-full h-full" id="server-stop" data-lang="stop"></button>
                </div>
                <main>
                    <div data-lang="port"></div>
                    <input class="config" type="number" id="server-port" min="1" max="65535" value="3000">
                </main>
            </details>
            <details id="mobile-controller" class="hide">
                <summary data-lang="mobile-controller"></summary>
                <div class="text-neutral-400 text-sm">localhost:PORT/mobile</div>
                <main>
                    <div data-lang="gyro-scope"></div>
                    <input class="config" type="checkbox" id="gyro-scope">
                </main>
                <main>
                    <div data-lang="gyro-scope-use-gamma"></div>
                    <input class="config" type="checkbox" id="gyro-scope-use-gamma">
                </main>
                <main>
                    <div data-lang="gyro-scope-invert"></div>
                    <input class="config" type="checkbox" id="gyro-scope-invert">
                </main>
                <main>
                    <div data-lang="gyro-scope-sensitivity"></div>
                    <input class="config" type="number" id="gyro-scope-sensitivity" min="1" max="100" value="10">
                </main>
            </details>
        </section>
        <section id="plugins" class="hide">
            <details>
                <summary data-lang="server"></summary>
                <main>
                    <div data-lang="mobile-controller"></div>
                    <input class="config" type="checkbox" id="plugin-server-mobile-controller">
                </main>
            </details>
            <details>
                <summary data-lang="utility"></summary>
                <main>
                    <div data-lang="replay"></div>
                    <input class="config" type="checkbox" id="plugin-utility-replay">
                </main>
            </details>
        </section>
        <section id="dev-mode" class="hide">
            <details>
                <summary data-lang="ranges"></summary>
                <div>
                    <input class="w-full" type="text" id="base" data-lang-ph="base">
                </div>
                <div>
                    <button class="w-full" id="get-ranges" data-lang="get"></button>
                    <button class="w-full" id="find-ranges" data-lang="find"></button>
                </div>
            </details>
            <details>
                <summary data-lang="jit"></summary>
                <div>
                    <input class="w-full" type="text" id="pattern" data-lang-ph="pattern">
                </div>
                <div>
                    <button class="w-full" id="search-pattern" data-lang="search"></button>
                </div>
            </details>
        </section>
    </div>
    <script type="module" src="../dist/main.js"></script>
</body>
</html>
